services:
  - type: web
    name: shopify-pulse
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shopify-pulse-db
          property: internalConnectionString  # gives: postgresql://user:pass@host:port/db
      - key: DATABASE_HOST
        fromDatabase:
          name: shopify-pulse-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: shopify-pulse-db
          property: port
      - key: DATABASE_USERNAME
        fromDatabase:
          name: shopify-pulse-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: shopify-pulse-db
          property: password
      - key: DATABASE_NAME
        fromDatabase:
          name: shopify-pulse-db
          property: database
      - key: PORT
        value: 8080
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_EMAIL
        value: demo@shopifypulse.com
      - key: DEMO_PASSWORD
        value: demo123
      - key: SHOPIFY_STORE_URL
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2025-01"
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
    healthCheckPath: /api/health

databases:
  - name: shopify-pulse-db
    plan: free
    databaseName: shopify_pulse
    user: shopify_pulse_user
